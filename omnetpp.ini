# --- Mobilite ---
**.camera*[*].mobility.typename = "StationaryMobility"
**.watch*[*].mobility.typename = "StationaryMobility"

**.phone*[*].mobility.typename = "RandomWaypointMobility"
**.phone*[*].mobility.speed = uniform(0.5mps, 2mps)
**.phone*[*].mobility.waitTime = uniform(1s, 5s)

# --- Applications UDP ---
# startTime=5s : laisse le temps a AODV et au PUF auth
*.phoneA[0].numApps = 1
*.phoneA[0].app[0].typename = "UdpBasicApp"
*.phoneA[0].app[0].destAddresses = "cameraB[0]"
*.phoneA[0].app[0].destPort = 5000
*.phoneA[0].app[0].messageLength = 512B
*.phoneA[0].app[0].sendInterval = 2s
*.phoneA[0].app[0].startTime = 5s
*.cameraB[0].numApps = 1
*.cameraB[0].app[0].typename = "UdpSink"
*.cameraB[0].app[0].localPort = 5000

*.phoneC[0].numApps = 1
*.phoneC[0].app[0].typename = "UdpBasicApp"
*.phoneC[0].app[0].destAddresses = "cameraA[0]"
*.phoneC[0].app[0].destPort = 5001
*.phoneC[0].app[0].messageLength = 512B
*.phoneC[0].app[0].sendInterval = 2s
*.phoneC[0].app[0].startTime = 5s
*.cameraA[0].numApps = 1
*.cameraA[0].app[0].typename = "UdpSink"
*.cameraA[0].app[0].localPort = 5001

*.phoneD[0].numApps = 1
*.phoneD[0].app[0].typename = "UdpBasicApp"
*.phoneD[0].app[0].destAddresses = "cameraC[0]"
*.phoneD[0].app[0].destPort = 5002
*.phoneD[0].app[0].messageLength = 512B
*.phoneD[0].app[0].sendInterval = 2s
*.phoneD[0].app[0].startTime = 5s
*.cameraC[0].numApps = 1
*.cameraC[0].app[0].typename = "UdpSink"
*.cameraC[0].app[0].localPort = 5002

