[General]
network = IoTNetwork
sim-time-limit = 600s
ned-path = ./:/home/ubuntuy/omnetpp-6.0.3/samples/inet4.5/src

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 400m
**.constraintAreaMaxY = 300m
**.constraintAreaMaxZ = 0m

*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addSubnetRoutes = false
*.configurator.config = xmldoc("config.xml")

**.wlan[*].radio.radioMediumModule = "radioMedium"
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].bitrate = 11Mbps

# --- Parametres AODV ---
**.aodv.activeRouteTimeout = 30s
**.aodv.deletePeriod = 30s
**.aodv.helloInterval = 2s
**.aodv.allowedHelloLoss = 2
**.aodv.rreqRetries = 3
**.aodv.rreqRatelimit = 10
**.aodv.ttlStart = 2
**.aodv.ttlIncrement = 2
**.aodv.ttlThreshold = 7
**.aodv.jitterPar = 0.005s
**.aodv.displayBubbles = true

# --- PUF Auth App ---
**.pufAuthApp.authStartTime = 20s
**.pufAuthApp.authInterval = 15s
**.pufAuthApp.cmdenv-log-level = trace

