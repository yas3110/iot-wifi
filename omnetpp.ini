# --- Mobilite ---
**.camera*[*].mobility.typename = "StationaryMobility"
**.watch*[*].mobility.typename = "StationaryMobility"
**.phone*[*].mobility.typename = "RandomWaypointMobility"
**.phone*[*].mobility.speed = uniform(0.5mps, 2mps)
**.phone*[*].mobility.waitTime = uniform(1s, 5s)

# --- Applications UDP ---
*.phoneB[0].numApps = 1
*.phoneB[0].app[0].typename = "UdpBasicApp"
*.phoneB[0].app[0].destAddresses = "cameraA[0]"
*.phoneB[0].app[0].destPort = 5000
*.phoneB[0].app[0].messageLength = 512B
*.phoneB[0].app[0].sendInterval = 20s
*.phoneB[0].app[0].startTime = 40s
*.cameraA[0].numApps = 1
*.cameraA[0].app[0].typename = "UdpSink"
*.cameraA[0].app[0].localPort = 5000

*.phoneC[0].numApps = 1
