[General]
network = IoTNetwork
sim-time-limit = 100s

# --- ZONE DE MOBILITÉ ---
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m
**.constraintAreaMaxZ = 0m

# --- CONFIGURATION RÉSEAU ---
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true
*.configurator.config = xml("<config> \
    <interface hosts='cameraA phoneA watchA' address='10.0.1.x' netmask='255.255.255.0'/> \
    <interface hosts='apA' address='10.0.1.1' netmask='255.255.255.0'/> \
    <interface hosts='cameraB phoneB watchB' address='10.0.2.x' netmask='255.255.255.0'/> \
    <interface hosts='apB' address='10.0.2.1' netmask='255.255.255.0'/> \
    <route hosts='cameraA watchA phoneA' destination='10.0.2.0' netmask='255.255.255.0' gateway='10.0.1.1'/> \
    <route hosts='cameraB watchB phoneB' destination='10.0.1.0' netmask='255.255.255.0' gateway='10.0.2.1'/> \
    </config>")

# --- LIEN RADIOMEDIUM PAR MAISON ---
*.apA.wlan[*].radio.radioMediumModule = "radioMediumA"
*.cameraA.wlan[*].radio.radioMediumModule = "radioMediumA"
*.phoneA.wlan[*].radio.radioMediumModule = "radioMediumA"
*.watchA.wlan[*].radio.radioMediumModule = "radioMediumA"

*.apB.wlan[*].radio.radioMediumModule = "radioMediumB"
*.cameraB.wlan[*].radio.radioMediumModule = "radioMediumB"
*.phoneB.wlan[*].radio.radioMediumModule = "radioMediumB"
*.watchB.wlan[*].radio.radioMediumModule = "radioMediumB"

# --- PARAMÈTRES WI-FI (clients) ---
*.cameraA.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.cameraA.wlan[*].agent.typename = "Ieee80211AgentSta"
*.phoneA.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.phoneA.wlan[*].agent.typename = "Ieee80211AgentSta"
*.watchA.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.watchA.wlan[*].agent.typename = "Ieee80211AgentSta"

*.cameraB.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.cameraB.wlan[*].agent.typename = "Ieee80211AgentSta"
*.phoneB.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.phoneB.wlan[*].agent.typename = "Ieee80211AgentSta"
*.watchB.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.watchB.wlan[*].agent.typename = "Ieee80211AgentSta"

# --- PARAMÈTRES WI-FI (AP) ---
*.apA.wlan[*].mgmt.typename = "Ieee80211MgmtAp"
*.apA.wlan[*].agent.typename = ""
*.apB.wlan[*].mgmt.typename = "Ieee80211MgmtAp"
*.apB.wlan[*].agent.typename = ""

# --- PUISSANCE ET DÉBIT ---
**.wlan[*].radio.transmitter.power = 20mW
**.wlan[*].bitrate = 11Mbps

# --- POSITIONS FIXES ---
*.apA.mobility.initialX = 250m
*.apA.mobility.initialY = 200m
*.apA.mobility.initialZ = 0m

*.apB.mobility.initialX = 450m
*.apB.mobility.initialY = 200m
*.apB.mobility.initialZ = 0m

*.cameraA.mobility.initialX = 150m
*.cameraA.mobility.initialY = 100m
*.cameraA.mobility.initialZ = 0m

*.watchA.mobility.initialX = 150m
*.watchA.mobility.initialY = 300m
*.watchA.mobility.initialZ = 0m

*.cameraB.mobility.initialX = 550m
*.cameraB.mobility.initialY = 100m
*.cameraB.mobility.initialZ = 0m

*.watchB.mobility.initialX = 550m
*.watchB.mobility.initialY = 300m
*.watchB.mobility.initialZ = 0m

*.phoneB.mobility.initialX = 550m
*.phoneB.mobility.initialY = 200m
*.phoneB.mobility.initialZ = 0m

# --- MOBILITÉ DU TÉLÉPHONE A ---
*.phoneA.mobility.typename = "LinearMobility"
*.phoneA.mobility.speed = 10mps
*.phoneA.mobility.initialX = 150m
*.phoneA.mobility.initialY = 200m
*.phoneA.mobility.initialZ = 0m

# --- MAISON A (Émetteurs + récepteur) ---
*.cameraA.numApps = 2
*.cameraA.app[0].typename = "UdpBasicApp"
*.cameraA.app[0].destAddresses = "phoneB"
*.cameraA.app[0].destPort = 5000
*.cameraA.app[0].messageLength = 1000B
*.cameraA.app[0].sendInterval = 0.1s
*.cameraA.app[0].startTime = 2s

*.cameraA.app[1].typename = "UdpSink"
*.cameraA.app[1].localPort = 5001

*.watchA.numApps = 1
*.watchA.app[0].typename = "UdpBasicApp"
*.watchA.app[0].destAddresses = "phoneB"
*.watchA.app[0].destPort = 5000
*.watchA.app[0].messageLength = 50B
*.watchA.app[0].sendInterval = 2s
*.watchA.app[0].startTime = 2s

# --- MAISON B (Récepteur + émetteur retour) ---
*.phoneB.numApps = 2
*.phoneB.app[0].typename = "UdpSink"
*.phoneB.app[0].localPort = 5000

*.phoneB.app[1].typename = "UdpBasicApp"
*.phoneB.app[1].destAddresses = "cameraA"
*.phoneB.app[1].destPort = 5001
*.phoneB.app[1].messageLength = 100B
*.phoneB.app[1].sendInterval = 1s
*.phoneB.app[1].startTime = 2s

# --- DÉSACTIVATION DES APPS INUTILISÉES ---
*.phoneA.numApps = 0
*.cameraB.numApps = 0
*.watchB.numApps = 0
